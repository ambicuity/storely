version: 2
updates:
  # Auto-bump GitHub Actions weekly. SHAs pinned in workflows stay current
  # without manual review — Dependabot will open a PR with the new SHA and
  # version comment whenever an action publishes a new release.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
