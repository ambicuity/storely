name: Chaos

# Adapter failure-mode tests. Opt-in via the `chaos` PR label. Runs on push
# to main + release branches. Tests are gated behind STORELY_CHAOS=1 so the
# main test suite stays clean.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: chaos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chaos:
    name: Adapter failure-mode tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'chaos'))
    env:
      STORELY_CHAOS: '1'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          run_install: false

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Start test services
        run: pnpm test:services:start

      # Each adapter's test runner reads STORELY_CHAOS to flip the
      # `chaos: true` flag in its storage suite invocation. Adapters that
      # haven't wired the flag yet are skipped.
      - name: Run chaos suites
        run: pnpm -r test:ci

      - name: Stop test services
        if: always()
        run: pnpm test:services:stop
