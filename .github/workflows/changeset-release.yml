name: Changesets Release

# Changesets-driven release workflow. Runs on pushes to main and opens a
# "Version Packages" PR with the aggregated pending changesets. When that
# PR merges, the workflow publishes the affected packages to npm.
#
# This is the primary release path going forward. The tag-driven publish
# job in ci.yml stays as a manual fallback for emergencies (e.g. shipping
# a security patch without going through the Version Packages PR).

on:
  push:
    branches:
      - main

concurrency:
  group: changeset-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          run_install: false

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build storely core before publishing so peer-dependent adapter builds
      # have a fresh dist to resolve against.
      - name: Build all packages
        run: pnpm build

      - name: Create release PR or publish
        uses: changesets/action@e2f8e964d080ae97c874b19e27b12e0a8620fb6c # v1.4.9
        with:
          publish: pnpm exec changeset publish --provenance
          version: pnpm exec changeset version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
