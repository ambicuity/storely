name: Release

on:
  # Trigger on semver tags pushed from the CLI (e.g. git tag v6.0.0 && git push --tags)
  push:
    tags:
      - 'v*'

  # Allow a manual run from the GitHub UI — useful for re-publishing a failed
  # release without re-tagging or for dry-run investigation.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag / version to publish (e.g. v6.0.0-alpha.4). Must already exist as a git tag.'
        required: false

concurrency:
  # Only one release job at a time to avoid partial publishes racing each other.
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so version-sync scripts and git describe work
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      # registry-url wires up NODE_AUTH_TOKEN to the npm registry automatically
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The root build script guarantees storely core is compiled before all
      # other packages, matching the constraint documented in AGENTS.md.
      - name: Build all packages
        run: pnpm build

      # ---------------------------------------------------------------------------
      # Best-effort version guard: ensure the git tag matches the version field
      # in the root package.json.  We read the tag from GITHUB_REF (push) or
      # from the workflow_dispatch input as a fallback.
      #
      # This step is intentionally non-fatal (|| true) on workflow_dispatch so
      # that maintainers can republish without having a tag available locally.
      # On a real tag push GITHUB_REF_NAME will always be the tag itself.
      # ---------------------------------------------------------------------------
      - name: Verify tag matches package version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          GIT_TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"

          echo "Package version: $PKG_VERSION"
          echo "Git tag:         $GIT_TAG"

          if [[ -n "$GIT_TAG" && "$GIT_TAG" != "$PKG_VERSION" ]]; then
            echo "::warning::Tag ($GIT_TAG) does not match package.json version ($PKG_VERSION). Proceeding anyway — verify this is intentional."
          else
            echo "Version check passed."
          fi

      # pnpm -r publish iterates every workspace package.
      # --access public is required for @scoped packages on the free npm tier.
      # --no-git-checks bypasses the "working tree must be clean" guard that
      #   would always fail inside a checked-out CI clone.
      # Private packages (private: true in their package.json) are automatically
      # skipped by pnpm — no extra filtering needed.
      - name: Publish packages to npm
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
