name: Perf Gate

# Compares latency percentiles (p50, p99) against committed baselines in
# perf-baselines/. Fails the run when any percentile regresses by more than
# 25% on any non-experimental adapter.
#
# This gate is OPT-IN for PRs (only runs when the `perf` label is applied)
# to avoid spending 5+ minutes on every change. It runs unconditionally on
# main + release branches.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: perf-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perf:
    name: Perf regression check
    runs-on: ubuntu-latest
    # PR: only run if labeled `perf`. Push to main: always run.
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'perf'))
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          run_install: false

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Start test services
        run: pnpm test:services:start

      - name: Run perf-baseline --compare
        run: pnpm tsx scripts/perf-baseline.ts --all --compare

      - name: Stop test services
        if: always()
        run: pnpm test:services:stop
